<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS:GO Serwery PL/DE</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      padding: 30px 20px;
    }
    h1 {
      text-align: center;
      color: #f0a500;
      margin-bottom: 6px;
      font-size: 2rem;
    }
    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 24px;
      font-size: 0.9rem;
    }
    .status {
      text-align: center;
      margin-bottom: 20px;
      font-size: 0.85rem;
      color: #aaa;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .status span { color: #4ade80; }
    table {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      border-collapse: collapse;
      background: #16213e;
      border-radius: 10px;
      overflow: hidden;
    }
    thead tr { background: #0f3460; }
    th {
      padding: 14px 16px;
      text-align: left;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #f0a500;
    }
    td {
      padding: 12px 16px;
      border-bottom: 1px solid #1a1a2e;
      font-size: 0.95rem;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1a2a4a; }
    .players { font-weight: bold; color: #4ade80; }
    .players.full { color: #f87171; }
    .flag { font-size: 1.2rem; }
    .btn-group { display: flex; gap: 8px; align-items: center; }
    .btn-connect {
      background: #f0a500;
      color: #000;
      border: none;
      padding: 7px 16px;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      font-size: 0.85rem;
      white-space: nowrap;
    }
    .btn-connect:hover { background: #fbbf24; }
    .btn-copy {
      background: #0f3460;
      color: #eee;
      border: 1px solid #333;
      padding: 7px 12px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.8rem;
      white-space: nowrap;
    }
    .btn-copy:hover { background: #1a4a80; }
    .btn-copy.copied { color: #4ade80; border-color: #4ade80; }
    .btn-refresh {
      background: none;
      border: 1px solid #f0a500;
      color: #f0a500;
      padding: 6px 14px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .btn-refresh:hover { background: #f0a50022; }
    .btn-refresh:disabled { opacity: 0.5; cursor: not-allowed; }
    .empty {
      text-align: center;
      padding: 40px;
      color: #888;
    }
  </style>
</head>
<body>
  <h1>🎮 CS:GO Server Browser</h1>
  <p class="subtitle">de_dust2 · 8–10 slotów · Polska & Niemcy</p>

  <div class="status">
    <span id="statusText">Status: oczekiwanie na dane</span>
    <span>Ostatnia aktualizacja: <span id="lastUpdate">—</span></span>
    <button class="btn-refresh" onclick="manualRefresh()">🔄 Odśwież</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Kraj</th>
        <th>Nazwa serwera</th>
        <th>Gracze</th>
        <th>Mapa</th>
        <th>Akcja</th>
      </tr>
    </thead>
    <tbody id="serverList">
      <tr><td colspan="5" class="empty">Kliknij Odśwież aby załadować serwery.</td></tr>
    </tbody>
  </table>

  <script>
    const refreshCooldownMs = 1500;
    let lastManualRefreshAt = 0;

    function getFlag(country) {
      return country === 'PL' ? '🇵🇱' : country === 'DE' ? '🇩🇪' : '🌍';
    }

    function setCopyButtonState(btn, label, success) {
      btn.textContent = label;
      if (success) {
        btn.classList.add('copied');
      } else {
        btn.classList.remove('copied');
      }

      setTimeout(() => {
        btn.textContent = 'Kopiuj connect';
        btn.classList.remove('copied');
      }, 2000);
    }

    async function fallbackCopyText(text) {
      const input = document.createElement('textarea');
      input.value = text;
      input.setAttribute('readonly', '');
      input.style.position = 'fixed';
      input.style.left = '-9999px';
      document.body.appendChild(input);
      input.select();

      try {
        const copied = document.execCommand('copy');
        if (!copied) {
          throw new Error('execCommand copy failed');
        }
      } finally {
        document.body.removeChild(input);
      }
    }

    async function copyToClipboard(text, btn) {
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(text);
        } else {
          await fallbackCopyText(text);
        }
        setCopyButtonState(btn, '✓ Skopiowano', true);
      } catch (err) {
        try {
          await fallbackCopyText(text);
          setCopyButtonState(btn, '✓ Skopiowano', true);
        } catch (fallbackErr) {
          setCopyButtonState(btn, '✗ Błąd kopiowania', false);
        }
      }
    }

    function updateStatus(data) {
      const statusEl = document.getElementById('statusText');
      if (data.refreshInProgress) {
        statusEl.textContent = 'Status: trwa odświeżanie live (wyniki mogą się różnić między próbami)…';
        return;
      }

      if (data.lastError) {
        statusEl.textContent = 'Status: ostatnie odświeżanie nieudane (' + data.lastError + ')';
        return;
      }

      if (data.freshness === 'never_succeeded') {
        statusEl.textContent = 'Status: brak udanego odświeżenia live';
        return;
      }

      if (data.freshness === 'stale' || (!data.freshness && data.stale)) {
        statusEl.textContent = 'Status: dane nieświeże (live query, możliwe różnice przy kolejnym odświeżeniu)';
        return;
      }

      statusEl.textContent = 'Status: OK (dane z zapytań live, mogą się chwilowo zmieniać)';
    }

    async function fetchServers() {
      try {
        const res = await fetch('/api/servers');
        const data = await res.json();
        const tbody = document.getElementById('serverList');

        updateStatus(data);

        if (data.lastUpdate) {
          document.getElementById('lastUpdate').textContent =
            new Date(data.lastUpdate).toLocaleTimeString('pl-PL');
        }

        if (!data.servers || data.servers.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="empty">Brak serwerów spełniających kryteria.</td></tr>';
          return;
        }

        tbody.innerHTML = data.servers.map(s => {
          const isFull = s.players >= s.maxplayers;
          const connectCmd = 'connect ' + s.ip;
          return `
            <tr>
              <td class="flag">${getFlag(s.country)}</td>
              <td>${s.name}</td>
              <td class="players ${isFull ? 'full' : ''}" title="Źródło graczy: ${s.playerCountSource || 'unknown'}">${s.players}/${s.maxplayers}</td>
              <td>${s.map}</td>
              <td>
                <div class="btn-group">
                  <a class="btn-connect" href="steam://run/4465480//+connect ${s.ip}">▶ Connect</a>
                  <button class="btn-copy" onclick="copyToClipboard('${connectCmd}', this)">Kopiuj connect</button>
                </div>
              </td>
            </tr>
          `;
        }).join('');

      } catch (err) {
        document.getElementById('statusText').textContent = 'Status: błąd połączenia z backendem';
      }
    }

    async function manualRefresh() {
      const btn = document.querySelector('.btn-refresh');
      const now = Date.now();
      if (now - lastManualRefreshAt < refreshCooldownMs) {
        return;
      }
      lastManualRefreshAt = now;

      btn.textContent = '⏳ Szukam...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/refresh', { method: 'POST' });
        if (!res.ok && res.status !== 202) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error || data.status || 'Refresh failed');
        }
        await fetchServers();
      } catch (err) {
        document.getElementById('statusText').textContent =
          'Status: nie udało się odświeżyć (pozostawiono poprzednie wyniki)';
      } finally {
        btn.textContent = '🔄 Odśwież';
        btn.disabled = false;
      }
    }

    // Załaduj dane przy starcie strony
    fetchServers();
  </script>
</body>
</html>
