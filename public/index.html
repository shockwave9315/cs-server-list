<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS:GO Serwery PL/DE</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      padding: 30px 20px;
    }
    h1 {
      text-align: center;
      color: #f0a500;
      margin-bottom: 6px;
      font-size: 2rem;
    }
    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 24px;
      font-size: 0.9rem;
    }
    .status {
      text-align: center;
      margin-bottom: 12px;
      font-size: 0.85rem;
      color: #aaa;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .status > span { color: #aaa; }
    .status .status-ok { color: #4ade80; }
    .controls {
      max-width: 900px;
      margin: 0 auto 10px;
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      align-items: end;
    }
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .control-group label {
      font-size: 0.75rem;
      color: #9aa0b3;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    input[type="search"], select {
      background: #16213e;
      color: #eee;
      border: 1px solid #25345d;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 0.85rem;
      width: 100%;
    }
    .toggles {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      font-size: 0.82rem;
    }
    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #c6cbe0;
    }
    .stats {
      max-width: 900px;
      margin: 0 auto 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .stat-chip {
      background: #16213e;
      border: 1px solid #25345d;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 0.8rem;
      color: #d8dcef;
    }
    table {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      border-collapse: collapse;
      background: #16213e;
      border-radius: 10px;
      overflow: hidden;
    }
    thead tr { background: #0f3460; }
    th {
      padding: 14px 16px;
      text-align: left;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #f0a500;
    }
    td {
      padding: 12px 16px;
      border-bottom: 1px solid #1a1a2e;
      font-size: 0.95rem;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1a2a4a; }
    .players { font-weight: bold; color: #4ade80; }
    .players.full { color: #f87171; }
    .flag { font-size: 1.2rem; }
    .server-name { font-weight: 600; }
    .muted { color: #8690a8; font-size: 0.8rem; }
    .badges { display: inline-flex; flex-wrap: wrap; gap: 4px; margin-left: 8px; }
    .badge {
      border: 1px solid #2c3c64;
      color: #c7d2fe;
      background: #111b36;
      border-radius: 999px;
      padding: 2px 7px;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .badge.full { border-color: #7f1d1d; color: #fecaca; background: #3f1515; }
    .badge.live { border-color: #166534; color: #bbf7d0; background: #15301f; }
    .badge.fallback { border-color: #92400e; color: #fde68a; background: #38220f; }
    .badge.low-ping { border-color: #0f766e; color: #99f6e4; background: #0f2626; }
    .badge.unstable { border-color: #7c2d12; color: #fed7aa; background: #3d1f13; }
    .badge.related { border-color: #334155; color: #cbd5e1; background: #111827; }
    .ping.good { color: #4ade80; font-weight: 600; }
    .ping.mid { color: #fbbf24; font-weight: 600; }
    .ping.high { color: #f87171; font-weight: 600; }
    .btn-group { display: flex; gap: 8px; align-items: center; }
    .btn-connect {
      background: #f0a500;
      color: #000;
      border: none;
      padding: 7px 16px;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      font-size: 0.85rem;
      white-space: nowrap;
    }
    .btn-connect:hover { background: #fbbf24; }
    .btn-copy,
    .btn-fav {
      background: #0f3460;
      color: #eee;
      border: 1px solid #333;
      padding: 7px 12px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.8rem;
      white-space: nowrap;
    }
    .btn-copy:hover,
    .btn-fav:hover { background: #1a4a80; }
    .btn-copy.copied { color: #4ade80; border-color: #4ade80; }
    .btn-copy.alt { padding: 7px 9px; }
    .btn-fav.active { color: #fcd34d; border-color: #f0a500; }
    .btn-refresh {
      background: none;
      border: 1px solid #f0a500;
      color: #f0a500;
      padding: 6px 14px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .btn-refresh:hover { background: #f0a50022; }
    .btn-refresh:disabled { opacity: 0.5; cursor: not-allowed; }
    .empty {
      text-align: center;
      padding: 40px;
      color: #888;
    }
    tr.expandable-row { cursor: pointer; }
    tr.expandable-row.expanded td { background: #1a2a4a; }
    .detail-row td {
      background: #111b36;
      border-bottom: 1px solid #1a1a2e;
      font-size: 0.84rem;
    }
    .details-grid {
      display: grid;
      gap: 6px 14px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      margin-bottom: 10px;
      color: #d8dcef;
    }
    .detail-item .label {
      color: #8ea0c9;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-right: 6px;
    }
    .players-list {
      background: #0f1730;
      border: 1px solid #22325f;
      border-radius: 8px;
      padding: 8px;
      max-height: 180px;
      overflow: auto;
    }
    .players-list ul { margin: 0; padding-left: 18px; }
    .players-list li { margin: 3px 0; color: #d9e0f8; }
    .players-list .empty-state { color: #8e9bc1; }
  </style>
</head>
<body>
  <h1>🎮 CS:GO Server Browser</h1>
  <p class="subtitle">de_dust2 · 8–10 slotów · Polska & Niemcy</p>

  <div class="status">
    <span id="statusText" class="status-ok">Status: oczekiwanie na dane</span>
    <span>Ostatnia aktualizacja: <span id="lastUpdate">—</span></span>
    <span>Auto-refresh: <span id="refreshCountdown">off</span></span>
    <button class="btn-refresh" onclick="manualRefresh()">🔄 Odśwież</button>
  </div>

  <div class="controls">
    <div class="control-group">
      <label for="searchInput">Szukaj serwera</label>
      <input id="searchInput" type="search" placeholder="np. Dust2" />
    </div>
    <div class="control-group">
      <label for="countryFilter">Kraj</label>
      <select id="countryFilter">
        <option value="all">Wszystkie</option>
      </select>
    </div>
    <div class="control-group">
      <label for="sortSelect">Sortowanie</label>
      <select id="sortSelect">
        <option value="players_desc">Gracze ↓</option>
        <option value="ping_asc">Ping ↑</option>
        <option value="name_asc">Nazwa A-Z</option>
      </select>
    </div>
    <div class="control-group">
      <label for="autoRefreshSelect">Auto-refresh</label>
      <select id="autoRefreshSelect">
        <option value="0">Wyłączony</option>
        <option value="15">15s</option>
        <option value="30">30s</option>
        <option value="60" selected>60s</option>
      </select>
    </div>
    <div class="control-group">
      <label>Widok</label>
      <div class="toggles">
        <label class="toggle"><input id="hideFullToggle" type="checkbox" /> Ukryj pełne</label>
        <label class="toggle"><input id="favoritesOnlyToggle" type="checkbox" /> Tylko ulubione</label>
        <label class="toggle" title="Tryb zaawansowany pokazuje więcej informacji w tabeli"><input id="advancedViewToggle" type="checkbox" /> Widok zaawansowany</label>
      </div>
    </div>
  </div>

  <div class="stats" id="statsBar"></div>

  <table>
    <thead>
      <tr id="tableHeadRow">
        <th>Kraj</th>
        <th>Nazwa serwera</th>
        <th>Gracze</th>
        <th>Ping</th>
        <th>Mapa</th>
        <th>Akcja</th>
      </tr>
    </thead>
    <tbody id="serverList">
      <tr><td colspan="6" class="empty">Kliknij Odśwież aby załadować serwery.</td></tr>
    </tbody>
  </table>

  <script>
    const refreshCooldownMs = 1500;
    const favoriteStorageKey = 'cs-server-browser-favorites';
    let lastManualRefreshAt = 0;
    let autoRefreshTimer = null;
    let countdownTimer = null;
    let autoRefreshDueAt = null;
    let isFetchingServers = false;
    let pendingFetchAfterCurrent = false;
    let latestSnapshot = null;
    let favorites = loadFavorites();
    let expandedServerIp = null;

    const state = {
      search: '',
      country: 'all',
      sort: 'players_desc',
      hideFull: false,
      favoritesOnly: false,
      autoRefreshSec: 60,
      advancedView: false
    };

    function getFlag(country) {
      return country === 'PL' ? '🇵🇱' : country === 'DE' ? '🇩🇪' : '🌍';
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function encodeInlineArg(value) {
      return encodeURIComponent(String(value ?? ''));
    }

    function loadFavorites() {
      try {
        const raw = localStorage.getItem(favoriteStorageKey);
        const parsed = JSON.parse(raw || '[]');
        if (!Array.isArray(parsed)) return new Set();
        return new Set(parsed.filter((item) => typeof item === 'string'));
      } catch (err) {
        return new Set();
      }
    }

    function saveFavorites() {
      localStorage.setItem(favoriteStorageKey, JSON.stringify(Array.from(favorites)));
    }

    function toggleFavorite(ip) {
      if (favorites.has(ip)) favorites.delete(ip);
      else favorites.add(ip);
      saveFavorites();
      applyAndRender();
    }

    function setCopyButtonState(btn, label, success, fallbackLabel = 'Kopiuj connect') {
      btn.textContent = label;
      if (success) {
        btn.classList.add('copied');
      } else {
        btn.classList.remove('copied');
      }

      setTimeout(() => {
        btn.textContent = fallbackLabel;
        btn.classList.remove('copied');
      }, 2000);
    }

    function formatDateTime(value) {
      if (!value) return '—';
      const timestamp = Date.parse(value);
      if (Number.isNaN(timestamp)) return value;
      return new Date(timestamp).toLocaleString('pl-PL');
    }

    function renderPlayerEntry(player) {
      if (typeof player === 'string') {
        return '<li>' + escapeHtml(player) + '</li>';
      }
      if (!player || typeof player !== 'object') {
        return '<li class="muted">Nieznany gracz</li>';
      }

      const name = player.name || player.raw || 'anon';
      const extras = [];
      if (typeof player.score === 'number') extras.push('score: ' + player.score);
      if (typeof player.time === 'number') extras.push('time: ' + Math.round(player.time) + 's');
      if (player.team) extras.push('team: ' + player.team);

      return '<li>' + escapeHtml(name) + (extras.length ? ' <span class="muted">(' + escapeHtml(extras.join(', ')) + ')</span>' : '') + '</li>';
    }

    function renderPlayersList(server) {
      const status = server.playerListStatus || 'unavailable';
      if (!Array.isArray(server.playerList)) {
        return '<div class="players-list"><div class="empty-state">Lista graczy niedostępna z live query dla tego odświeżenia.</div></div>';
      }

      if (server.playerList.length > 0) {
        return '<div class="players-list"><ul>' + server.playerList.map(renderPlayerEntry).join('') + '</ul></div>';
      }

      if (status === 'empty') {
        return '<div class="players-list"><div class="empty-state">Brak aktywnych graczy.</div></div>';
      }

      if (status === 'filtered_invalid') {
        return '<div class="players-list"><div class="empty-state">Lista graczy została odfiltrowana jako niepoprawna (metadane/placeholdery).</div></div>';
      }

      return '<div class="players-list"><div class="empty-state">Lista graczy niedostępna z live query dla tego odświeżenia.</div></div>';
    }

    function renderServerDetails(server, colspan) {
      return `
        <tr class="detail-row">
          <td colspan="${colspan}">
            <div class="details-grid">
              <div class="detail-item" title="Adres do połączenia"><span class="label">IP:port</span>${escapeHtml(server.ip || '—')}</div>
              <div class="detail-item" title="Ping z ostatniego live query"><span class="label">Ping</span>${typeof server.ping === 'number' ? server.ping + ' ms' : '—'}</div>
              <div class="detail-item" title="Źródło liczby graczy"><span class="label">Źródło graczy</span>${escapeHtml(server.playerCountSource || 'unknown')}</div>
              <div class="detail-item" title="Kiedy serwer był ostatnio widziany"><span class="label">lastSeenAt</span>${escapeHtml(formatDateTime(server.lastSeenAt))}</div>
              <div class="detail-item" title="Ile kolejnych odświeżeń serwer pominął"><span class="label">Missed refresh</span>${Number.isInteger(server.missedRefreshCount) ? server.missedRefreshCount : '—'}</div>
              <div class="detail-item" title="Stabilność obecności serwera"><span class="label">Stability</span>${escapeHtml(server.stabilityState || 'unknown')}</div>
              <div class="detail-item" title="Znacznik czasu ostatniego odświeżenia listy"><span class="label">lastRefreshAt</span>${escapeHtml(formatDateTime(server.lastRefreshAt))}</div>
            </div>
            <div>
              <div class="muted" style="margin-bottom:6px;">Gracze online</div>
              ${renderPlayersList(server)}
            </div>
          </td>
        </tr>
      `;
    }

    function syncTableHead() {
      const row = document.getElementById('tableHeadRow');
      row.innerHTML = state.advancedView
        ? '<th>Kraj</th><th>Nazwa serwera</th><th>Gracze</th><th>Ping</th><th>Mapa</th><th>Źródło / stabilność</th><th>Akcja</th>'
        : '<th>Kraj</th><th>Nazwa serwera</th><th>Gracze</th><th>Ping</th><th>Mapa</th><th>Akcja</th>';
    }

    function toggleDetails(ip) {
      if (!ip) return;
      expandedServerIp = expandedServerIp === ip ? null : ip;
      applyAndRender();
    }

    function getPingLevel(ping) {
      if (typeof ping !== 'number') return { cls: '', label: '—' };
      if (ping <= 50) return { cls: 'good', label: ping + ' ms' };
      if (ping <= 100) return { cls: 'mid', label: ping + ' ms' };
      return { cls: 'high', label: ping + ' ms' };
    }


    function getHostPart(ip) {
      if (typeof ip !== 'string') return '';
      const idx = ip.lastIndexOf(':');
      return idx > 0 ? ip.slice(0, idx) : ip;
    }

    function buildRelatedServerMeta(servers) {
      const hostCounts = new Map();
      const nameCounts = new Map();

      for (const server of servers) {
        const host = getHostPart(server.ip);
        if (host) hostCounts.set(host, (hostCounts.get(host) || 0) + 1);
        const nameKey = String(server.name || '').trim().toLowerCase();
        if (nameKey) nameCounts.set(nameKey, (nameCounts.get(nameKey) || 0) + 1);
      }

      return { hostCounts, nameCounts };
    }

    function serverBadges(server, isFull, relatedMeta) {
      const badges = [];
      if (isFull) badges.push('<span class="badge full">full</span>');
      if (server.playerCountSource === 'gamedig_live') badges.push('<span class="badge live">live</span>');
      if (server.playerCountSource === 'steam_fallback') badges.push('<span class="badge fallback">fallback</span>');
      if (typeof server.ping === 'number' && server.ping <= 50) badges.push('<span class="badge low-ping">low ping</span>');
      if (server.stabilityState === 'stale' || (Number.isInteger(server.missedRefreshCount) && server.missedRefreshCount >= 2)) {
        badges.push('<span class="badge unstable">unstable</span>');
      }

      const host = getHostPart(server.ip);
      const sameHostCount = host ? (relatedMeta.hostCounts.get(host) || 0) : 0;
      const nameKey = String(server.name || '').trim().toLowerCase();
      const sameNameCount = nameKey ? (relatedMeta.nameCounts.get(nameKey) || 0) : 0;
      if (sameHostCount > 1 || sameNameCount > 1) {
        badges.push('<span class="badge related" title="Podobna nazwa lub wspólny host — to osobny serwer (inne IP:port)">podobny</span>');
      }

      return badges.join('');
    }

    function updateStatus(data) {
      const statusEl = document.getElementById('statusText');
      statusEl.classList.remove('status-ok');

      if (data.refreshInProgress) {
        statusEl.textContent = 'Status: trwa odświeżanie live (wyniki mogą się różnić między próbami)…';
        return;
      }

      if (data.lastError) {
        statusEl.textContent = 'Status: ostatnie odświeżanie nieudane (' + data.lastError + ')';
        return;
      }

      if (data.freshness === 'never_succeeded') {
        statusEl.textContent = 'Status: brak udanego odświeżenia live';
        return;
      }

      if (data.freshness === 'stale' || (!data.freshness && data.stale)) {
        statusEl.textContent = 'Status: dane nieświeże (live query, możliwe różnice przy kolejnym odświeżeniu)';
        return;
      }

      statusEl.textContent = 'Status: OK (dane z zapytań live, mogą się chwilowo zmieniać)';
      statusEl.classList.add('status-ok');
    }

    function updateStats(servers, filtered) {
      const fullCount = filtered.filter((s) => s.players >= s.maxplayers).length;
      const withPing = filtered.filter((s) => typeof s.ping === 'number');
      const avgPing = withPing.length
        ? Math.round(withPing.reduce((sum, s) => sum + s.ping, 0) / withPing.length) + ' ms'
        : '—';
      const liveCount = filtered.filter((s) => s.playerCountSource === 'gamedig_live').length;
      const fallbackCount = filtered.filter((s) => s.playerCountSource === 'steam_fallback').length;

      const stats = [
        'Pokazane: ' + filtered.length + '/' + servers.length,
        'Śr. ping: ' + avgPing,
        'Pełne: ' + fullCount,
        'Live/Fallback: ' + liveCount + '/' + fallbackCount
      ];

      document.getElementById('statsBar').innerHTML = stats.map((text) => '<span class="stat-chip">' + text + '</span>').join('');
    }

    function sortServers(servers) {
      return servers.sort((a, b) => {
        // Predictable rule: favorites are always grouped first, then selected sort is applied.
        const favA = favorites.has(a.ip) ? 1 : 0;
        const favB = favorites.has(b.ip) ? 1 : 0;
        if (favA !== favB) return favB - favA;

        if (state.sort === 'players_desc') return (b.players - a.players) || a.name.localeCompare(b.name, 'pl');
        if (state.sort === 'ping_asc') {
          const pingA = typeof a.ping === 'number' ? a.ping : Number.MAX_SAFE_INTEGER;
          const pingB = typeof b.ping === 'number' ? b.ping : Number.MAX_SAFE_INTEGER;
          return (pingA - pingB) || a.name.localeCompare(b.name, 'pl');
        }
        return a.name.localeCompare(b.name, 'pl');
      });
    }

    function applyAndRender() {
      const tbody = document.getElementById('serverList');
      const data = latestSnapshot;
      if (!data || !Array.isArray(data.servers)) {
        return;
      }

      let filtered = data.servers.filter((s) => {
        if (state.search && !s.name.toLowerCase().includes(state.search)) return false;
        if (state.country !== 'all' && s.country !== state.country) return false;
        if (state.hideFull && s.players >= s.maxplayers) return false;
        if (state.favoritesOnly && !favorites.has(s.ip)) return false;
        return true;
      });

      filtered = sortServers(filtered);
      updateStats(data.servers, filtered);

      if (filtered.length === 0) {
        const hasActiveFilters = Boolean(state.search)
          || state.country !== 'all'
          || state.hideFull
          || state.favoritesOnly;

        let emptyMessage = 'Brak dostępnych serwerów.';
        if (hasActiveFilters) {
          emptyMessage = 'Brak serwerów spełniających kryteria.';
        } else if (data.servers.length === 0 && data.lastError && data.freshness === 'never_succeeded') {
          emptyMessage = 'Brak danych — ostatnie odświeżenie nieudane.';
        }

        tbody.innerHTML = '<tr><td colspan="' + (state.advancedView ? 7 : 6) + '" class="empty">' + emptyMessage + '</td></tr>';
        return;
      }

      const visibleIps = new Set(filtered.map((server) => server.ip));
      if (expandedServerIp && !visibleIps.has(expandedServerIp)) expandedServerIp = null;
      const relatedMeta = buildRelatedServerMeta(filtered);

      tbody.innerHTML = filtered.map((s) => {
        const isFull = s.players >= s.maxplayers;
        const connectCmd = 'connect ' + s.ip;
        const ping = getPingLevel(s.ping);
        const favActive = favorites.has(s.ip);
        const isExpanded = expandedServerIp === s.ip;
        const detailColspan = state.advancedView ? 7 : 6;
        const metaCol = state.advancedView
          ? '<td title="Źródło i stabilność"><span class="muted">' + escapeHtml(s.playerCountSource || 'unknown') + '</span><br>' + escapeHtml(s.stabilityState || 'stable') + '</td>'
          : '';

        return `
          <tr class="expandable-row ${isExpanded ? 'expanded' : ''}" onclick="handleRowClick(event, decodeURIComponent('${encodeInlineArg(s.ip)}'))" title="Kliknij, aby ${isExpanded ? 'zwinąć' : 'rozwinąć'} szczegóły">
            <td class="flag">${getFlag(s.country)}</td>
            <td>
              <span class="server-name">${escapeHtml(s.name)}</span>
              <span class="badges">${serverBadges(s, isFull, relatedMeta)}</span>
              <div class="muted" title="Adres serwera">${escapeHtml(s.ip || '—')}</div>
              ${((getHostPart(s.ip) && (relatedMeta.hostCounts.get(getHostPart(s.ip)) || 0) > 1) || ((relatedMeta.nameCounts.get(String(s.name || '').trim().toLowerCase()) || 0) > 1)) ? '<div class="muted">Osobny wpis: inny port/endpoint.</div>' : ''}
            </td>
            <td class="players ${isFull ? 'full' : ''}" title="Źródło graczy: ${escapeHtml(s.playerCountSource || 'unknown')}">${s.players}/${s.maxplayers}</td>
            <td class="ping ${ping.cls}" title="Ping z live query">${ping.label}</td>
            <td title="Mapa">${s.map ? escapeHtml(s.map) : '<span class="muted">—</span>'}</td>
            ${metaCol}
            <td>
              <div class="btn-group">
                <button class="btn-fav ${favActive ? 'active' : ''}" onclick="toggleFavorite(decodeURIComponent('${encodeInlineArg(s.ip)}'))">${favActive ? '★' : '☆'}</button>
                <a class="btn-connect" href="steam://run/4465480//+connect ${escapeHtml(s.ip)}">▶ Connect</a>
                <button class="btn-copy" onclick="copyToClipboard(decodeURIComponent('${encodeInlineArg(connectCmd)}'), this)">Kopiuj connect</button>
                <button class="btn-copy alt" onclick="copyToClipboard(decodeURIComponent('${encodeInlineArg(s.ip)}'), this, 'Kopiuj IP')" title="Kopiuj samo IP:port">IP</button>
              </div>
            </td>
          </tr>
          ${isExpanded ? renderServerDetails(s, detailColspan) : ''}
        `;
      }).join('');
    }

    function handleRowClick(event, ip) {
      const interactive = event.target.closest('button, a, input, select, label');
      if (interactive) return;
      toggleDetails(ip);
    }

    function updateCountryOptions(servers) {
      const select = document.getElementById('countryFilter');
      const prev = state.country;
      const countries = Array.from(new Set(servers.map((s) => s.country).filter(Boolean))).sort();
      select.innerHTML = '<option value="all">Wszystkie</option>' + countries
        .map((country) => '<option value="' + escapeHtml(country) + '">' + escapeHtml(country) + '</option>')
        .join('');
      if (countries.includes(prev)) {
        select.value = prev;
      } else {
        select.value = 'all';
        state.country = 'all';
      }
    }

    async function fallbackCopyText(text) {
      const input = document.createElement('textarea');
      input.value = text;
      input.setAttribute('readonly', '');
      input.style.position = 'fixed';
      input.style.left = '-9999px';
      document.body.appendChild(input);
      input.select();

      try {
        const copied = document.execCommand('copy');
        if (!copied) {
          throw new Error('execCommand copy failed');
        }
      } finally {
        document.body.removeChild(input);
      }
    }

    async function copyToClipboard(text, btn, fallbackLabel) {
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(text);
        } else {
          await fallbackCopyText(text);
        }
        setCopyButtonState(btn, '✓ Skopiowano', true, fallbackLabel);
      } catch (err) {
        try {
          await fallbackCopyText(text);
          setCopyButtonState(btn, '✓ Skopiowano', true, fallbackLabel);
        } catch (fallbackErr) {
          setCopyButtonState(btn, '✗ Błąd kopiowania', false, fallbackLabel);
        }
      }
    }

    function startCountdown() {
      if (countdownTimer) clearInterval(countdownTimer);

      countdownTimer = setInterval(() => {
        const el = document.getElementById('refreshCountdown');
        if (!state.autoRefreshSec) {
          el.textContent = 'off';
          return;
        }

        if (!autoRefreshDueAt) {
          el.textContent = state.autoRefreshSec + 's';
          return;
        }

        const leftMs = Math.max(0, autoRefreshDueAt - Date.now());
        el.textContent = Math.ceil(leftMs / 1000) + 's';
      }, 300);
    }

    function scheduleAutoRefresh() {
      if (autoRefreshTimer) {
        clearTimeout(autoRefreshTimer);
        autoRefreshTimer = null;
      }

      if (!state.autoRefreshSec) {
        autoRefreshDueAt = null;
        return;
      }

      autoRefreshDueAt = Date.now() + state.autoRefreshSec * 1000;
      autoRefreshTimer = setTimeout(async () => {
        await fetchServers();
        scheduleAutoRefresh();
      }, state.autoRefreshSec * 1000);
    }

    async function fetchServers() {
      if (isFetchingServers) {
        pendingFetchAfterCurrent = true;
        return;
      }

      isFetchingServers = true;
      try {
        const res = await fetch('/api/servers');
        const data = await res.json();

        latestSnapshot = data;
        updateStatus(data);

        if (data.lastUpdate) {
          document.getElementById('lastUpdate').textContent =
            new Date(data.lastUpdate).toLocaleTimeString('pl-PL');
        }

        const servers = Array.isArray(data.servers) ? data.servers : [];
        updateCountryOptions(servers);
        applyAndRender();
      } catch (err) {
        document.getElementById('statusText').textContent = 'Status: błąd połączenia z backendem (pozostawiono poprzednie wyniki)';
      } finally {
        isFetchingServers = false;
        if (pendingFetchAfterCurrent) {
          pendingFetchAfterCurrent = false;
          fetchServers();
        }
      }
    }

    async function manualRefresh() {
      const btn = document.querySelector('.btn-refresh');
      const now = Date.now();
      if (now - lastManualRefreshAt < refreshCooldownMs) {
        return;
      }
      lastManualRefreshAt = now;

      btn.textContent = '⏳ Szukam...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/refresh', { method: 'POST' });
        if (!res.ok && res.status !== 202) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error || data.status || 'Refresh failed');
        }
        await fetchServers();
      } catch (err) {
        document.getElementById('statusText').textContent =
          'Status: nie udało się odświeżyć (pozostawiono poprzednie wyniki)';
      } finally {
        btn.textContent = '🔄 Odśwież';
        btn.disabled = false;
        scheduleAutoRefresh();
      }
    }

    function initControls() {
      document.getElementById('searchInput').addEventListener('input', (event) => {
        state.search = event.target.value.trim().toLowerCase();
        applyAndRender();
      });

      document.getElementById('countryFilter').addEventListener('change', (event) => {
        state.country = event.target.value;
        applyAndRender();
      });

      document.getElementById('sortSelect').addEventListener('change', (event) => {
        state.sort = event.target.value;
        applyAndRender();
      });

      document.getElementById('hideFullToggle').addEventListener('change', (event) => {
        state.hideFull = event.target.checked;
        applyAndRender();
      });

      document.getElementById('favoritesOnlyToggle').addEventListener('change', (event) => {
        state.favoritesOnly = event.target.checked;
        applyAndRender();
      });

      document.getElementById('advancedViewToggle').addEventListener('change', (event) => {
        state.advancedView = event.target.checked;
        syncTableHead();
        applyAndRender();
      });

      document.getElementById('autoRefreshSelect').addEventListener('change', (event) => {
        state.autoRefreshSec = Number(event.target.value) || 0;
        scheduleAutoRefresh();
      });
    }

    initControls();
    syncTableHead();
    startCountdown();
    fetchServers();
    scheduleAutoRefresh();
  </script>
</body>
</html>
